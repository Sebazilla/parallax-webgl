<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Parallax Wimmelbild</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    #start, #hud {
      position: fixed;
      left: 0;
      right: 0;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      text-align: center;
      pointer-events: none;
    }
    #start {
      top: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 10;
      pointer-events: auto;
      cursor: pointer;
    }
    #start h1 {
      font-size: 22px;
      margin: 0 0 8px;
      font-weight: 600;
    }
    #start p {
      font-size: 14px;
      opacity: 0.75;
      margin: 0 20px 24px;
      line-height: 1.4;
    }
    #start button {
      font-size: 16px;
      padding: 14px 28px;
      border-radius: 12px;
      border: 0;
      background: #ffd95a;
      color: #1a1a1a;
      font-weight: 600;
    }
    #hud {
      bottom: 16px;
      font-size: 11px;
      opacity: 0.5;
      letter-spacing: 0.3px;
    }
    #hud.hidden { display: none; }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <video id="cam" playsinline autoplay muted></video>
  <div id="start">
    <h1>Parallax Wimmelbild</h1>
    <p>Tippen um zu starten — danach bitte Kamera freigeben, um Kopf-Tracking zu aktivieren.</p>
    <button id="startBtn">Starten</button>
  </div>
  <div id="hud" class="hidden"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
